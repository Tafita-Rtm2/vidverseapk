name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # On force la version exacte qui contient Dart 3.8+ pour satisfaire flutter_lints 6.0
          flutter-version: '3.41.9' 
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd rtm_tv_mobile
          # On force la mise à jour des dépendances pour aligner les versions
          flutter pub upgrade --major-versions

      - name: Build APK
        run: |
          cd rtm_tv_mobile
          # Ajout du flag pour ignorer les alertes de version Gradle et forcer le build
          flutter build apk --release \
            --android-skip-build-dependency-validation \
            --obfuscate --split-debug-info=build/app/outputs/symbols \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }} \
            --dart-define=AUTH_KEY=${{ secrets.AUTH_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rtm-tv-release
          path: rtm_tv_mobile/build/app/outputs/flutter-apk/app-release.apk
