name: rtm_tv_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0

  # ✅ Lecteur vidéo compatible Flutter 3.x
  better_player_plus: ^1.2.1

  cached_network_image: ^3.3.0
  carousel_slider: ^5.0.0
  flutter_blurhash: ^0.8.2
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # ✅ Ajouté pour corriger le problème d'icône floue
  flutter_launcher_icons: ^0.13.1

# Configuration du générateur d'icônes
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  # Configuration Adaptive Icon pour Android (évite l'effet flou)
  adaptive_icon_background: "#0F111A" # Remplace par ta couleur de fond exacte
  adaptive_icon_foreground: "assets/logo.png" 

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
